# cargo-deny configuration — supply-chain policy.
# Run locally with: cargo deny check
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
# Use the default advisory database; fail on any unmaintained/vulnerable crate.
version = 2
yanked = "deny"
ignore = [
    # paste (RUSTSEC-2024-0436) is unmaintained. It is a transitive proc-macro
    # dependency of ratatui 0.28 (via lru/paste), used only at compile time to
    # generate code; no runtime impact and no safe upgrade is available yet.
    # Revisit when ratatui bumps its `lru`/`paste` dependency.
    { id = "RUSTSEC-2024-0436", reason = "Unmaintained transitive proc-macro dep of ratatui (via lru); compile-time only, no safe upgrade available yet." },
]

[licenses]
version = 2
# Licenses we accept across the dependency tree (project itself is MIT OR Apache-2.0).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # Not currently pulled by any claudine dependency (cargo-deny reports it as
    # an unmatched allowance); kept from josephine's allow-list for parity in
    # case a future dep (e.g. a CA-certificate bundle) needs it.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# `claudine` depends on the internal workspace crate `claudine-core` via a
# path dependency without a version (crates/claudine/Cargo.toml). cargo-deny's
# built-in `allow-wildcard-paths` exception only applies to crates marked
# `publish = false`, and touching Cargo.toml is out of scope for this
# config-only task — so the wildcard is skipped explicitly instead of
# flagged as an unpinned external dependency.
skip = [
    { crate = "claudine", reason = "path dependency on claudine-core (internal workspace crate, not published to crates.io) is intentional, not an unpinned external dep" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
