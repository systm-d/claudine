<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{{ config.description }}">
  <meta name="theme-color" content="{{ config.extra.brand_color }}">
  <link rel="icon" href="{{ get_url(path='favicon.svg') }}" type="image/svg+xml">
  <link rel="icon" href="{{ get_url(path='favicon-32.png') }}" sizes="32x32" type="image/png">
  <link rel="icon" href="{{ get_url(path='favicon.ico') }}" sizes="any">
  <link rel="apple-touch-icon" href="{{ get_url(path='apple-touch-icon.png') }}">
  <link rel="stylesheet" href="{{ get_url(path='main.css') }}">
</head>
<body>
  {% block content %}{% endblock %}
  <footer class="footer">
    <picture>
      <source srcset="{{ get_url(path='footer.webp') }}" type="image/webp">
      <img class="footer-art" src="{{ get_url(path='footer.png') }}" width="1300" height="867"
           alt="Claudine kicking back at the desk — ~/.claude under control" loading="lazy">
    </picture>
    <span>Claudine · local-first · open source ·
      <a href="{{ config.extra.repo_url }}">GitHub</a></span>
  </footer>
</body>
</html>
