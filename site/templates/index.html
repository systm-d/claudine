{% extends "base.html" %}
{% block content %}
<header class="hero">
  <div class="topbar"><span class="wordmark">Claudine</span></div>
  <svg class="logo" viewBox="0 0 17 6" width="132" role="img" aria-label="Logo Claudine" shape-rendering="crispEdges">
    <g fill="currentColor">
      <rect x="3" y="0" width="12" height="1"/>
      <rect x="3" y="1" width="2" height="1"/>
      <rect x="6" y="1" width="6" height="1"/>
      <rect x="13" y="1" width="2" height="1"/>
      <rect x="1" y="2" width="16" height="1"/>
      <rect x="3" y="3" width="12" height="1"/>
      <rect x="4" y="4" width="1" height="1"/>
      <rect x="6" y="4" width="1" height="1"/>
      <rect x="11" y="4" width="1" height="1"/>
      <rect x="13" y="4" width="1" height="1"/>
    </g>
  </svg>
  <h1>{{ section.extra.tagline }}</h1>
  <p class="lede">{{ section.extra.lede }}</p>
  <div class="cta">
    <a class="btn btn-primary" href="#install">{{ section.extra.cta2 }}</a>
    <a class="btn" href="{{ config.extra.repo_url }}">{{ section.extra.cta }}</a>
  </div>
</header>
<main>{{ section.content | safe }}</main>
{% endblock %}
