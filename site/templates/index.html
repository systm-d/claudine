{% extends "base.html" %}
{% block content %}
<header class="hero">
  <div class="topbar">
    <span class="wordmark">Claudine</span>
    <nav class="langswitch" aria-label="Language">
      <a href="{{ get_url(path='fr/') }}"{% if lang == 'fr' %} class="on" aria-current="true"{% endif %}>FR</a>
      <a href="{{ get_url(path='/') }}"{% if lang == 'en' %} class="on" aria-current="true"{% endif %}>EN</a>
    </nav>
  </div>
  <picture>
    <source srcset="{{ get_url(path='hero.webp') }}" type="image/webp">
    <img class="hero-art" src="{{ get_url(path='hero.png') }}" width="1200" height="800"
         alt="Claude Code and Claudine as two caped heroes, side by side" fetchpriority="high">
  </picture>
  <h1>{{ section.extra.tagline }}</h1>
  <p class="lede">{{ section.extra.lede }}</p>
  <div class="cta">
    <a class="btn btn-primary" href="#install">{{ section.extra.cta2 }}</a>
    <a class="btn" href="{{ config.extra.repo_url }}">{{ section.extra.cta }}</a>
  </div>
</header>
<main>{{ section.content | safe }}</main>
{% endblock %}
